<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>고양이 상사 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #bubble {
      position: fixed;
      background: white;
      border-radius: 14px;
      padding: 10px 20px;
      font-size: 2rem;
      font-weight: 900;
      color: #222;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      transform: translate(-50%, -100%) translateY(-12px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      white-space: nowrap;
      z-index: 200;
    }
    #bubble.show { opacity: 1; }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      border: 9px solid transparent;
      border-top-color: white;
      border-bottom: 0;
    }

    #score {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      z-index: 200;
    }

    #ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(14px);
      border-radius: 22px 22px 0 0;
      padding: 14px 14px 20px;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.13);
      z-index: 100;
    }

    .to-line { font-size: 0.72rem; color: #bbb; margin-bottom: 7px; }
    .to-line b { color: #5b6af0; }

    #preview {
      font-size: 0.75rem;
      color: #555;
      background: #f4f5ff;
      border-radius: 8px;
      padding: 6px 10px;
      min-height: 26px;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    #preview.empty { color: #ccc; font-style: italic; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-bottom: 8px;
    }

    .ph {
      background: #f7f8ff;
      border: 1.5px solid #e0e0f0;
      border-radius: 9px;
      padding: 8px 4px;
      font-size: 0.72rem;
      cursor: pointer;
      color: #444;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.12s;
    }
    .ph.on { background: #eef0ff; border-color: #5b6af0; color: #4a59e0; font-weight: 700; }

    .row { display: flex; gap: 8px; }

    #sendBtn {
      flex: 1;
      background: #5b6af0;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #sendBtn:disabled { background: #c8c8c8; }

    #clearBtn {
      background: #f0f0f0;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.8rem;
      color: #999;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="bubble">ㅇㅋ</div>
<div id="score">📨 0통</div>

<div id="ui">
  <div class="to-line">To: <b>🐱 냥 부장님 &lt;meow@company.cat&gt;</b></div>
  <div id="preview" class="empty">문구를 선택하세요</div>
  <div class="grid">
    <button class="ph" onclick="pick(this)">안녕하세요, 부장님.</button>
    <button class="ph" onclick="pick(this)">수고하셨습니다!</button>
    <button class="ph" onclick="pick(this)">확인 부탁드립니다.</button>
    <button class="ph" onclick="pick(this)">감사합니다.</button>
    <button class="ph" onclick="pick(this)">빠른 처리 부탁드립니다.</button>
    <button class="ph" onclick="pick(this)">잘 부탁드립니다 🙏</button>
  </div>
  <div class="row">
    <button id="sendBtn" onclick="send()" disabled>보내기 📤</button>
    <button id="clearBtn" onclick="clearMail()">지우기</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
const UI_H = () => document.getElementById('ui').offsetHeight + 10;
const CW = () => window.innerWidth;
const CH = () => window.innerHeight - UI_H();

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 18, 40);

const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 100);
camera.position.set(0, 3.2, 8.5);
camera.lookAt(0, 1.5, 0);

function resize() {
  const w = CW(), h = CH();
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xfffaf0, 1.4);
sun.position.set(6, 10, 7);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
sun.shadow.camera.top = 10; sun.shadow.camera.bottom = -10;
scene.add(sun);
const fill = new THREE.PointLight(0x8899ff, 0.45, 20);
fill.position.set(-5, 5, 3);
scene.add(fill);

const L = (color, opts) => new THREE.MeshLambertMaterial({ color, ...opts });
function Box(w,h,d,mat){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.castShadow=true; m.receiveShadow=true; return m; }
function Sph(r,mat,seg=14){ const m=new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg),mat); m.castShadow=true; return m; }
function Cyl(r,h,mat,seg=12){ const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,seg),mat); m.castShadow=true; return m; }
function Cone(r,h,mat,seg=4){ const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),mat); m.castShadow=true; return m; }
function p(m,x,y,z){ m.position.set(x,y,z); return m; }
function rv(m,x,y,z){ m.rotation.set(x,y,z); return m; }

const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), L(0xC9A87A));
floor.rotation.x = -Math.PI/2; floor.receiveShadow=true;
scene.add(floor);
const bwall = new THREE.Mesh(new THREE.PlaneGeometry(30,14), L(0xF5EBD7));
bwall.position.set(0,7,-11); scene.add(bwall);
const rwall = new THREE.Mesh(new THREE.PlaneGeometry(30,14), L(0xF0E4D0));
rwall.position.set(13,7,0); rwall.rotation.y=-Math.PI/2; scene.add(rwall);

const deskG = new THREE.Group();
deskG.add(p(Box(4.6,0.13,2.1,L(0x8B5E3C)),0,1.55,0));
[[-2.1,0.76,-0.85],[2.1,0.76,-0.85],[-2.1,0.76,0.85],[2.1,0.76,0.85]].forEach(([x,y,z])=>deskG.add(p(Box(0.13,1.52,0.13,L(0x5C3A1A)),x,y,z)));
deskG.position.z=-2.8; scene.add(deskG);

const monG = new THREE.Group();
monG.add(p(Box(2.0,1.3,0.1,L(0x111122)),0,0.65,0));
monG.add(p(Box(1.82,1.12,0.05,L(0x0066dd,{emissive:new THREE.Color(0x001133)})),0,0.65,0.08));
monG.add(p(Box(0.14,0.35,0.14,L(0x111122)),0,0,0));
monG.add(p(Box(0.6,0.06,0.4,L(0x111122)),0,-0.15,0));
monG.position.set(0.8,1.67,-4.6); scene.add(monG);

const chairG = new THREE.Group();
chairG.add(p(Box(1.3,0.1,1.3,L(0x2C3E50)),0,0.88,0));
chairG.add(p(Box(1.3,1.1,0.1,L(0x253545)),0,1.43,-0.6));
chairG.add(p(Cyl(0.05,0.78,L(0x888888)),0,0.37,0));
chairG.add(p(new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.05,5),L(0x888888)),0,0.02,0));
chairG.position.set(0,0,-2.6); scene.add(chairG);

const catG = new THREE.Group();
const CO=L(0xF5A623),CL2=L(0xFFE4B5),CD=L(0xD4881A),CP=L(0xFFAAAA),CB=L(0x111111),CW2=L(0xFFFFFF);

const body=Sph(0.52,CO); body.scale.set(1,1.05,0.88); p(body,0,0.52,0); catG.add(body);
const belly=Sph(0.33,CL2); belly.scale.set(1,1.15,0.55); p(belly,0,0.52,0.37); catG.add(belly);
const head=Sph(0.42,CO); p(head,0,1.32,0); catG.add(head);

[-0.27,0.27].forEach(ex=>{
  const eo=Cone(0.15,0.28,CO); p(eo,ex,1.62,0); rv(eo,0,0,ex>0?0.35:-0.35); catG.add(eo);
  const ei=Cone(0.08,0.17,CP); p(ei,ex*0.92,1.60,0.06); rv(ei,0.2,0,ex>0?0.35:-0.35); catG.add(ei);
});

[-0.14,0.14].forEach(ex=>{
  const eye=Sph(0.072,CB,10); p(eye,ex,1.34,0.37); catG.add(eye);
  const shine=Sph(0.022,CW2,6); p(shine,ex+0.02,1.36,0.43); catG.add(shine);
});

const nose=Sph(0.04,CP,8); p(nose,0,1.24,0.41); catG.add(nose);

[-1,0,1].forEach(row=>[-1,1].forEach(side=>{
  const w=new THREE.Mesh(new THREE.CylinderGeometry(0.004,0.004,0.42),CD);
  w.position.set(side*0.25,1.24+row*0.03,0.37);
  rv(w,0,0,Math.PI/2); w.rotation.x=row*0.12;
  catG.add(w);
}));

[-0.6,0.6].forEach(ex=>{
  const arm=Cyl(0.1,0.42,CO); p(arm,ex,1.07,0.28); rv(arm,0.4,0,ex>0?-0.5:0.5); catG.add(arm);
  const paw=Sph(0.12,CL2,8); p(paw,ex*1.1,0.88,0.5); catG.add(paw);
});

const tieShape=new THREE.Shape();
tieShape.moveTo(0,0.13); tieShape.lineTo(-0.11,0.02); tieShape.lineTo(-0.07,-0.40); tieShape.lineTo(0,-0.54); tieShape.lineTo(0.07,-0.40); tieShape.lineTo(0.11,0.02); tieShape.closePath();
const tie=new THREE.Mesh(new THREE.ShapeGeometry(tieShape),L(0xCC0000,{side:THREE.DoubleSide})); p(tie,0,0.75,0.51); catG.add(tie);

[-0.14,0.14].forEach(ex=>{
  const frame=new THREE.Mesh(new THREE.TorusGeometry(0.085,0.012,6,16),L(0x333333));
  p(frame,ex,1.34,0.4); rv(frame,Math.PI/2,0,0); catG.add(frame);
});
const bridge=new THREE.Mesh(new THREE.CylinderGeometry(0.007,0.007,0.1),L(0x333333));
rv(bridge,0,0,Math.PI/2); p(bridge,0,1.34,0.4); catG.add(bridge);

const tailCurve=new THREE.CatmullRomCurve3([new THREE.Vector3(0.5,0.35,-0.3),new THREE.Vector3(0.9,0.7,-0.1),new THREE.Vector3(1.1,1.0,0.1),new THREE.Vector3(0.85,1.2,0.2)]);
const tailMesh=new THREE.Mesh(new THREE.TubeGeometry(tailCurve,10,0.065,8,false),CO);
const tailTip=Sph(0.09,CL2,8); p(tailTip,0.85,1.2,0.2);
catG.add(tailMesh); catG.add(tailTip);
catG.position.set(-0.3,1.61,-2.9);
scene.add(catG);

function makePlane(){
  const v=new Float32Array([
    0,0.04,0.5,-0.38,0,-0.28,0,0.08,-0.22,
    0,0.04,0.5,0,0.08,-0.22,0.38,0,-0.28,
    0,0.04,0.5,-0.38,0,-0.28,0,-0.04,-0.1,
    0,0.04,0.5,0,-0.04,-0.1,0.38,0,-0.28,
    -0.38,0,-0.28,0,-0.04,-0.1,0,0.08,-0.22,
    0.38,0,-0.28,0,0.08,-0.22,0,-0.04,-0.1,
  ]);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(v,3));
  g.computeVertexNormals();
  const m=new THREE.Mesh(g,new THREE.MeshLambertMaterial({color:0xFFFFFF,side:THREE.DoubleSide}));
  m.castShadow=true; return m;
}

let airplane=null,planeT=0,planeFlying=false;
const PS=new THREE.Vector3(0,0.8,5.5);
const PC1=new THREE.Vector3(2.5,5.5,2);
const PC2=new THREE.Vector3(-1.5,4.5,-1);
const PE=new THREE.Vector3(-0.2,2.1,-2.0);
let catReacting=false,catReactT=0,lines=[],sent=0,combo=0,comboTimer=0;

const REACTIONS=[
  ['ㅇㅋ','확인','알겠음','읽었음','👍','...','검토중','나중에'],
  ['수고해','고마워','잘했어 🐾','오케이오케이'],
  ['바빠 지금','잠깐만','급함?','우선순위 낮음'],
  ['확인완료 ✓','승인 ✓','반려 ✗','재검토 요망'],
  ['그만 좀 보내 😾','스팸이냐','차단할거야','메일함 꽉참 😤'],
];
function getReaction(){
  if(sent>=15) return REACTIONS[4][Math.floor(Math.random()*REACTIONS[4].length)];
  if(combo>=3) return ['콤보?! 🐱','연속이잖아','쉬지도 않네'][Math.floor(Math.random()*3)];
  const pool=lines.some(l=>l.includes('감사')||l.includes('수고'))?REACTIONS[1]:
              lines.some(l=>l.includes('빠른'))?REACTIONS[2]:
              lines.some(l=>l.includes('확인'))?REACTIONS[3]:REACTIONS[0];
  return pool[Math.floor(Math.random()*pool.length)];
}

function pick(btn){
  btn.classList.toggle('on');
  const txt=btn.textContent.trim();
  if(btn.classList.contains('on')) lines.push(txt);
  else lines=lines.filter(l=>l!==txt);
  const prev=document.getElementById('preview');
  if(lines.length===0){prev.textContent='문구를 선택하세요';prev.className='empty';}
  else{prev.textContent=lines.join(' ');prev.className='';}
  document.getElementById('sendBtn').disabled=lines.length===0;
}

function clearMail(){
  lines=[];
  document.querySelectorAll('.ph').forEach(b=>b.classList.remove('on'));
  const prev=document.getElementById('preview');
  prev.textContent='문구를 선택하세요';prev.className='empty';
  document.getElementById('sendBtn').disabled=true;
}

function send(){
  if(lines.length===0||planeFlying) return;
  sent++; combo++; comboTimer=2.5;
  const suffix=combo>=3?` (${combo}연속!)`:'';
  document.getElementById('score').textContent=`📨 ${sent}통${suffix}`;
  if(airplane) scene.remove(airplane);
  airplane=makePlane();
  airplane.position.copy(PS);
  scene.add(airplane);
  planeT=0;planeFlying=true;
  clearMail();
}

let currentReaction='ㅇㅋ';
function showBubble(){
  const v=new THREE.Vector3(-0.3,2.5,-2.9);
  v.project(camera);
  const x=(v.x+1)/2*CW();
  const y=(1-v.y)/2*CH();
  const b=document.getElementById('bubble');
  b.textContent=currentReaction;
  b.style.left=x+'px';b.style.top=y+'px';
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),1800);
}

function bez(p0,p1,p2,p3,t){const k=1-t;return p0*k*k*k+3*p1*k*k*t+3*p2*k*t*t+p3*t*t*t;}

let prevT=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-prevT)/1000,0.05),t=now/1000;
  prevT=now;
  catG.position.y=1.61+Math.sin(t*1.4)*0.018;
  tailMesh.rotation.z=Math.sin(t*2.2)*0.12;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=0;document.getElementById('score').textContent=`📨 ${sent}통`;}}
  if(catReacting){
    catReactT+=dt;
    catG.rotation.y=Math.sin(catReactT*18)*0.18;
    if(catReactT>0.55){catReacting=false;catReactT=0;catG.rotation.y=0;showBubble();}
  }
  if(planeFlying&&airplane){
    planeT+=dt*0.55;
    const pp=Math.min(planeT,1);
    airplane.position.x=bez(PS.x,PC1.x,PC2.x,PE.x,pp);
    airplane.position.y=bez(PS.y,PC1.y,PC2.y,PE.y,pp);
    airplane.position.z=bez(PS.z,PC1.z,PC2.z,PE.z,pp);
    airplane.rotation.y=t*4;
    airplane.rotation.x=Math.sin(pp*Math.PI)*0.6-0.3;
    airplane.scale.setScalar(1+Math.sin(pp*Math.PI)*0.4);
    if(pp>=1){planeFlying=false;scene.remove(airplane);airplane=null;catReacting=true;catReactT=0;currentReaction=getReaction();}
  }
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
